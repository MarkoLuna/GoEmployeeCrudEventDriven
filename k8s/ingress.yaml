apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: employee-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    # -------------------------------------------------------
    # employee-service — REST API (producer / CRUD)
    # -------------------------------------------------------
    - host: api.employee-service.local
      http:
        paths:
          - path: /api/employee
            pathType: Prefix
            backend:
              service:
                name: employee-service
                port:
                  number: 8080
          - path: /oauth
            pathType: Prefix
            backend:
              service:
                name: employee-service
                port:
                  number: 8080
          - path: /swagger
            pathType: Prefix
            backend:
              service:
                name: employee-service
                port:
                  number: 8080
          - path: /healthcheck
            pathType: Prefix
            backend:
              service:
                name: employee-service
                port:
                  number: 8080

    # -------------------------------------------------------
    # employee-consumer — Kafka consumer / read replica API
    # -------------------------------------------------------
    - host: api.employee-consumer.local
      http:
        paths:
          - path: /api/employee
            pathType: Prefix
            backend:
              service:
                name: employee-consumer-service
                port:
                  number: 8080
          - path: /oauth
            pathType: Prefix
            backend:
              service:
                name: employee-consumer-service
                port:
                  number: 8080
          - path: /swagger
            pathType: Prefix
            backend:
              service:
                name: employee-consumer-service
                port:
                  number: 8080
          - path: /healthcheck
            pathType: Prefix
            backend:
              service:
                name: employee-consumer-service
                port:
                  number: 8080

# kubectl apply -f k8s/ingress.yaml
