apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: default
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: employee-config
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: DB_NAME
              value: "auth_db"
            - name: OAUTH_PROVIDER
              value: "keycloak"
            - name: OAUTH_ENABLED
              value: "true"
            - name: KEYCLOAK_AUTH_SERVER_URL
              value: "http://keycloak-service:8080"
            - name: KEYCLOAK_REALM
              value: "dev"
            - name: OAUTH_CLIENT_ID
              value: "client"
            - name: OAUTH_CLIENT_SECRET
              value: "password"
            - name: OAUTH_USER_ID
              value: "000000"
            - name: OAUTH_USER_NAME
              value: "user"
